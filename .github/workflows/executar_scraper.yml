name: Executar Scraping e Processamento Real

on:
  workflow_dispatch:

jobs:
  scrapar-e-processar:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 requests

    - name: Executar Scraper OLX
      env:
        SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
      run: |
        python main.py

    - name: Executar Processamento de Dados
      run: |
        python processar_dados.py <<< ""

    - name: Commitar dados diretamente no repositório
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # Adiciona apenas os novos arquivos JSON gerados na pasta processed
        git add data/processed/*.json
        
        # Só faz o commit se houver novos dados para evitar falhas caso o scraper não traga nada
        git diff-index --quiet HEAD || git commit -m "bot: atualizando dados extraídos da OLX [skip ci]"
        
        git push
